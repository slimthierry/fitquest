version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: fitquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitquest
      POSTGRES_PASSWORD: fitquest_secret
      POSTGRES_DB: fitquest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitquest"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: fitquest-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitquest-backend
    restart: unless-stopped
    ports:
      - "84000:84000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fitquest:fitquest_secret@postgres:5432/fitquest
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: fitquest-dev-secret-key-change-in-production
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  redis_data:
